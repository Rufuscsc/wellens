<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reader — Wellens</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#161412;--surface:#1e1c18;--surface2:#252119;--border:#2e2b26;
  --accent:#c9a84c;--text:#f0ead8;--text-muted:#7a7260;--text-sub:#4a4538;
  --danger:#c0442a;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;
  height:100vh;display:flex;flex-direction:column;overflow:hidden;
  user-select:none;-webkit-user-select:none;
}
canvas{user-select:none;-webkit-user-select:none;pointer-events:none;}

/* Watermark */
.watermark{position:fixed;inset:0;z-index:900;pointer-events:none;overflow:hidden;}
.watermark-text{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(-30deg);
  font-family:'Playfair Display',serif;font-size:20px;
  letter-spacing:.25em;color:rgba(201,168,76,0.055);
  white-space:nowrap;pointer-events:none;
}

/* Titlebar */
.titlebar{
  -webkit-app-region:drag;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;height:46px;
  border-bottom:1px solid var(--border);flex-shrink:0;
  background:var(--bg);z-index:50;
}
.titlebar-left{display:flex;align-items:center;gap:10px;-webkit-app-region:no-drag;}
.logo-icon{width:28px;height:28px;background:var(--accent);border-radius:6px;display:grid;place-items:center;}
.logo-icon svg{width:14px;height:14px;color:#0f0e0c;}
.book-name{font-family:'Playfair Display',serif;font-size:.88rem;color:var(--text-muted);max-width:380px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.titlebar-right{display:flex;align-items:center;gap:10px;-webkit-app-region:no-drag;}

/* Countdown */
.countdown{
  display:flex;align-items:center;gap:7px;
  background:rgba(192,68,42,.12);border:1px solid rgba(192,68,42,.35);
  border-radius:8px;padding:5px 12px;
}
.countdown.urgent{background:rgba(192,68,42,.28);animation:pulse .9s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.countdown svg{width:13px;height:13px;color:#d0654a;flex-shrink:0;}
.countdown-text{font-size:.76rem;color:#d0654a;font-weight:600;font-variant-numeric:tabular-nums;min-width:65px;}

/* Win controls */
.win-controls{display:flex;gap:5px;}
.win-btn{width:26px;height:26px;border:1px solid var(--border);background:var(--surface2);border-radius:6px;display:grid;place-items:center;cursor:pointer;transition:all .15s;}
.win-btn:hover{background:var(--border);}
.win-btn.close:hover{background:var(--danger);}
.win-btn svg{width:11px;height:11px;color:var(--text-muted);}

/* Toolbar */
.toolbar{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:7px 18px;border-bottom:1px solid var(--border);
  background:var(--surface);flex-shrink:0;
}
.toolbar-group{display:flex;align-items:center;gap:5px;}
.divider{width:1px;height:20px;background:var(--border);margin:0 4px;}
.tool-btn{
  display:flex;align-items:center;gap:5px;
  padding:5px 10px;border:1px solid var(--border);border-radius:7px;
  background:var(--surface2);color:var(--text-muted);
  font-family:'DM Sans',sans-serif;font-size:.77rem;cursor:pointer;transition:all .15s;
}
.tool-btn:hover:not(:disabled){background:var(--border);color:var(--text);}
.tool-btn:disabled{opacity:.35;cursor:not-allowed;}
.tool-btn svg{width:13px;height:13px;flex-shrink:0;}
.page-info{
  font-size:.77rem;color:var(--text-muted);padding:5px 12px;
  background:var(--surface2);border:1px solid var(--border);border-radius:7px;
  font-variant-numeric:tabular-nums;min-width:82px;text-align:center;
}
.zoom-display{min-width:52px;text-align:center;cursor:default;}
.drm-badge{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:.71rem;color:var(--text-sub);}
.drm-badge svg{width:12px;height:12px;}

/* Reader body */
.reader-body{
  flex:1;overflow-y:auto;overflow-x:auto;
  background:var(--bg);
  display:flex;justify-content:center;
  padding:28px 24px;
}
.reader-body::-webkit-scrollbar{width:7px;height:7px;}
.reader-body::-webkit-scrollbar-track{background:transparent;}
.reader-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

#pdfContainer{
  display:flex;flex-direction:column;align-items:center;
  gap:20px;padding-bottom:48px;
}
.pdf-page-wrap{
  position:relative;
  box-shadow:0 6px 40px rgba(0,0,0,.65);
  border-radius:3px;overflow:hidden;flex-shrink:0;
}
.pdf-page-wrap canvas{display:block;pointer-events:none;}

/* Loading */
.loading-screen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  z-index:800;
}
.spinner{width:42px;height:42px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.84rem;color:var(--text-muted);}
.loading-progress{font-size:.75rem;color:var(--text-sub);}

/* Expired */
.expired-screen{
  position:fixed;inset:0;background:rgba(15,14,12,.97);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  z-index:999;text-align:center;padding:40px;
}
.expired-icon{width:68px;height:68px;background:rgba(192,68,42,.15);border:1px solid rgba(192,68,42,.3);border-radius:16px;display:grid;place-items:center;}
.expired-icon svg{width:32px;height:32px;color:#d0654a;}
.expired-title{font-family:'Playfair Display',serif;font-size:1.5rem;}
.expired-sub{font-size:.84rem;color:var(--text-muted);max-width:340px;line-height:1.6;}
.expired-note{font-size:.73rem;color:var(--text-sub);}
</style>
</head>
<body>

<div class="watermark"><div class="watermark-text">WELLENS — PROTECTED COPY</div></div>

<!-- Loading -->
<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <p class="loading-text" id="loadingText">Decrypting book…</p>
  <p class="loading-progress" id="loadingProgress"></p>
</div>

<!-- Expired -->
<div class="expired-screen" id="expiredScreen">
  <div class="expired-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
  </div>
  <h2 class="expired-title">Access Expired</h2>
  <p class="expired-sub">The time limit for this shared book has ended. Please contact the sender for a new share link.</p>
  <p class="expired-note">This window will close in a few seconds…</p>
</div>

<!-- Titlebar -->
<div class="titlebar">
  <div class="titlebar-left">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    </div>
    <span class="book-name" id="bookName">Loading…</span>
  </div>
  <div class="titlebar-right">
    <!-- Hidden until we confirm an expiry exists -->
    <div class="countdown" id="countdown" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span class="countdown-text" id="countdownText">--:--:--</span>
    </div>
    <div class="win-controls">
      <div class="win-btn" onclick="window.reader.minimize()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
      <div class="win-btn" onclick="window.reader.maximize()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/></svg></div>
      <div class="win-btn close" onclick="window.reader.close()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
    </div>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="toolbar-group">
    <button class="tool-btn" id="prevBtn" onclick="prevPage()" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>Prev
    </button>
    <span class="page-info" id="pageInfo">— / —</span>
    <button class="tool-btn" id="nextBtn" onclick="nextPage()" disabled>
      Next<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
  <div class="divider"></div>
  <div class="toolbar-group">
    <button class="tool-btn" onclick="zoomOut()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <span class="tool-btn zoom-display" id="zoomVal">—</span>
    <button class="tool-btn" onclick="zoomIn()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <button class="tool-btn" onclick="fitToWidth()">Fit Width</button>
    <button class="tool-btn" onclick="applyZoom(1.0)">100%</button>
  </div>
  <div class="drm-badge">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    Protected · Read-only
  </div>
</div>

<!-- Scrollable PDF area -->
<div class="reader-body" id="readerBody">
  <div id="pdfContainer"></div>
</div>

<script>
// ── PDF.js ──
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── DRM ──
document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (
    (e.ctrlKey || e.metaKey) && ['s','p','c','a','u'].includes(k) ||
    (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(k)) ||
    e.key === 'PrintScreen' || e.key === 'F12'
  ) { e.preventDefault(); e.stopImmediatePropagation(); }
}, true);
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('dragstart', e => e.preventDefault());
document.addEventListener('copy', e => e.preventDefault());

// ── State ──
const { shareId, expiresAt: urlExpiresAt } = window.reader.getParams();
let expiresAtMs   = urlExpiresAt && urlExpiresAt > 0 ? urlExpiresAt : null;
let pdfDoc        = null;
let totalPages    = 0;
let currentPage   = 1;
let scale         = 1.4;
let isRendering   = false;
let countdownInt  = null;
let hasExpired    = false;

// ── Init ──
async function init() {
  setText('Fetching encrypted PDF…');

  const res = await window.reader.getPDF(shareId);

  if (!res || !res.success) {
    if (res?.error === 'expired') { triggerExpired(); return; }
    setText(res?.error || 'Failed to load PDF.', true);
    return;
  }

  // ── FIX: expiresAt comes from the server response — always trust this ──
  if (res.expiresAt && Number(res.expiresAt) > 0) {
    expiresAtMs = Number(res.expiresAt);
  }

  // Show and start the countdown as soon as we have the expiry value
  if (expiresAtMs) {
    document.getElementById('countdown').style.display = 'flex';
    startCountdown();
  }

  document.getElementById('bookName').textContent = res.bookTitle || 'Shared Book';

  setText('Decoding…');
  // Decode base64 → Uint8Array in memory (never touches disk)
  const bStr  = atob(res.data);
  const bytes = new Uint8Array(bStr.length);
  for (let i = 0; i < bStr.length; i++) bytes[i] = bStr.charCodeAt(i);

  setText('Loading PDF structure…');
  pdfDoc     = await pdfjsLib.getDocument({ data: bytes }).promise;
  totalPages = pdfDoc.numPages;

  // ── FIX: calculate fit-width scale from actual PDF dimensions ──
  scale = await calcFitWidthScale();

  document.getElementById('loadingScreen').style.display = 'none';

  await renderAllPages();
  updateToolbar();
}

// ── FIX: proper fit-width calculation ──
async function calcFitWidthScale() {
  const page    = await pdfDoc.getPage(1);
  const vp1     = page.getViewport({ scale: 1 });
  const bodyEl  = document.getElementById('readerBody');
  const bodyW   = bodyEl.clientWidth;
  const padding = 64; // 32px each side
  return Math.max(0.4, (bodyW - padding) / vp1.width);
}

// ── Render all pages ──
async function renderAllPages() {
  if (!pdfDoc || isRendering) return;
  isRendering = true;

  const container = document.getElementById('pdfContainer');
  container.innerHTML = '';
  document.getElementById('zoomVal').textContent = Math.round(scale * 100) + '%';

  let maxW = 0;

  for (let n = 1; n <= totalPages; n++) {
    document.getElementById('loadingProgress').textContent =
      totalPages > 1 ? `Page ${n} / ${totalPages}` : '';

    const page = await pdfDoc.getPage(n);
    // ── FIX: use devicePixelRatio so canvas is never blurry or shrunken ──
    const dpr      = window.devicePixelRatio || 1;
    const viewport = page.getViewport({ scale: scale * dpr });
    const cssW     = viewport.width  / dpr;
    const cssH     = viewport.height / dpr;

    if (cssW > maxW) maxW = cssW;

    const wrap       = document.createElement('div');
    wrap.className   = 'pdf-page-wrap';
    wrap.id          = `pdf-page-${n}`;
    wrap.style.width  = cssW + 'px';
    wrap.style.height = cssH + 'px';

    const canvas      = document.createElement('canvas');
    // Physical pixels (sharp on HiDPI)
    canvas.width      = viewport.width;
    canvas.height     = viewport.height;
    // CSS size (correct visual size)
    canvas.style.width  = cssW + 'px';
    canvas.style.height = cssH + 'px';

    wrap.appendChild(canvas);
    container.appendChild(wrap);

    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;

    // Watermark
    ctx.save();
    ctx.globalAlpha = 0.045;
    ctx.fillStyle   = '#c9a84c';
    const fs = Math.max(14, Math.floor(viewport.width / 22));
    ctx.font = `${fs}px 'Playfair Display', serif`;
    ctx.translate(viewport.width / 2, viewport.height / 2);
    ctx.rotate(-Math.PI / 7);
    ctx.textAlign = 'center';
    ctx.fillText('WELLENS', 0, 0);
    ctx.restore();
  }

  // ── FIX: set container width so pages center correctly at any zoom ──
  container.style.width = maxW + 'px';
  container.style.minWidth = maxW + 'px';

  isRendering = false;
  document.getElementById('loadingProgress').textContent = '';
  document.getElementById('loadingScreen').style.display = 'none';
}

// ── Navigation ──
function scrollToPage(num) {
  const el = document.getElementById(`pdf-page-${num}`);
  if (!el) return;
  el.scrollIntoView({ behavior: num === 1 ? 'instant' : 'smooth', block: 'start' });
  currentPage = num;
  updateToolbar();
}
function prevPage() { if (currentPage > 1)         scrollToPage(currentPage - 1); }
function nextPage() { if (currentPage < totalPages) scrollToPage(currentPage + 1); }

document.getElementById('readerBody').addEventListener('scroll', () => {
  for (let i = 1; i <= totalPages; i++) {
    const el = document.getElementById(`pdf-page-${i}`);
    if (!el) continue;
    const rect = el.getBoundingClientRect();
    if (rect.top <= window.innerHeight * 0.55 && rect.bottom > 0) {
      if (currentPage !== i) { currentPage = i; updateToolbar(); }
      break;
    }
  }
}, { passive: true });

function updateToolbar() {
  document.getElementById('pageInfo').textContent = pdfDoc ? `${currentPage} / ${totalPages}` : '— / —';
  document.getElementById('prevBtn').disabled = currentPage <= 1;
  document.getElementById('nextBtn').disabled = currentPage >= totalPages;
}

// ── Zoom ──
async function applyZoom(newScale) {
  if (isRendering) return;
  scale = Math.max(0.3, Math.min(newScale, 5.0));
  await renderAllPages();
  scrollToPage(currentPage);
}
function zoomIn()    { applyZoom(scale + 0.2); }
function zoomOut()   { applyZoom(Math.max(0.3, scale - 0.2)); }
async function fitToWidth() { applyZoom(await calcFitWidthScale()); }

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && (e.key === '=' || e.key === '+')) { e.preventDefault(); zoomIn(); }
  if ((e.ctrlKey || e.metaKey) && e.key === '-')                    { e.preventDefault(); zoomOut(); }
  if ((e.ctrlKey || e.metaKey) && e.key === '0')                    { e.preventDefault(); fitToWidth(); }
  if (e.key === 'PageDown' || e.key === 'ArrowRight') nextPage();
  if (e.key === 'PageUp'   || e.key === 'ArrowLeft')  prevPage();
});

// ── Countdown ──
function startCountdown() {
  if (!expiresAtMs) return;

  function tick() {
    if (hasExpired) return;
    const rem = expiresAtMs - Date.now();
    if (rem <= 0) { triggerExpired(); return; }

    const h = Math.floor(rem / 3_600_000);
    const m = Math.floor((rem % 3_600_000) / 60_000);
    const s = Math.floor((rem % 60_000) / 1_000);
    document.getElementById('countdownText').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;

    const el = document.getElementById('countdown');
    rem < 5 * 60_000 ? el.classList.add('urgent') : el.classList.remove('urgent');
  }

  tick();
  countdownInt = setInterval(tick, 1000);
}
function pad(n) { return String(n).padStart(2, '0'); }

// ── Expiry ──
async function triggerExpired() {
  if (hasExpired) return;
  hasExpired = true;
  clearInterval(countdownInt);
  document.getElementById('expiredScreen').style.display = 'flex';
  await window.reader.expired(shareId);
  setTimeout(() => window.reader.close(), 6000);
}

// ── Helpers ──
function setText(msg, isErr = false) {
  const el = document.getElementById('loadingText');
  el.textContent = msg;
  if (isErr) { el.style.color = '#d0654a'; document.querySelector('.spinner').style.display = 'none'; }
}

init();
</script>
</body>
</html>
