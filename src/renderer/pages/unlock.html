<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unlock — Wellens</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0e0c;--surface:#1a1815;--surface2:#221f1b;--border:#2e2b26;--accent:#c9a84c;--text:#f0ead8;--text-muted:#7a7260;--text-sub:#4a4538;--danger:#c0442a;--radius:12px;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;-webkit-app-region:no-drag;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;}

.titlebar{position:fixed;top:0;left:0;right:0;height:40px;-webkit-app-region:drag;display:flex;align-items:center;justify-content:flex-end;padding:0 14px;}
.win-btn{-webkit-app-region:no-drag;width:26px;height:26px;border:1px solid var(--border);background:var(--surface2);border-radius:6px;display:grid;place-items:center;cursor:pointer;transition:all .15s;}
.win-btn:hover{background:var(--danger);}
.win-btn svg{width:11px;height:11px;color:var(--text-muted);}

.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:40px;width:380px;max-width:92vw;position:relative;z-index:1;animation:fadeUp .4s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.icon-wrap{width:56px;height:56px;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.25);border-radius:14px;display:grid;place-items:center;margin:0 auto 20px;}
.icon-wrap svg{width:26px;height:26px;color:var(--accent);}
h1{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;text-align:center;margin-bottom:6px;}
.subtitle{font-size:.83rem;color:var(--text-muted);text-align:center;margin-bottom:28px;}

.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
.form-label{font-size:.78rem;color:var(--text-muted);font-weight:500;}
.input-wrap{position:relative;}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .15s;}
.form-input:focus{border-color:var(--accent);}
.toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-sub);padding:4px;}
.toggle-pw:hover{color:var(--text-muted);}
.toggle-pw svg{width:15px;height:15px;}

.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border:none;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;transition:all .17s;}
.btn-primary{background:var(--accent);color:#0f0e0c;}
.btn-primary:hover{background:#d9b85c;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}

.error-msg{background:rgba(192,68,42,.12);border:1px solid rgba(192,68,42,.3);border-radius:8px;padding:10px 14px;font-size:.8rem;color:#d0654a;margin-bottom:16px;display:none;text-align:center;line-height:1.5;}
.error-msg.show{display:block;}
.error-msg.device-limit{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.3);color:var(--accent);}

.app-brand{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:24px;}
.logo-icon{width:24px;height:24px;background:var(--accent);border-radius:5px;display:grid;place-items:center;}
.logo-icon svg{width:13px;height:13px;color:#0f0e0c;}
.app-brand span{font-family:'Playfair Display',serif;font-size:.85rem;color:var(--text-muted);}
</style>
</head>
<body>

<div class="titlebar">
  <div class="win-btn" onclick="window.wellens.closeWindow()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </div>
</div>

<div class="card">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  </div>
  <h1>Protected Book</h1>
  <p class="subtitle">Enter the password to access this shared book.</p>

  <div class="error-msg" id="errorMsg"></div>

  <div class="form-group">
    <label class="form-label">Password</label>
    <div class="input-wrap">
      <input class="form-input" type="password" id="passwordInput" placeholder="Enter password…" autocomplete="current-password">
      <button class="toggle-pw" onclick="togglePw()" tabindex="-1">
        <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <button class="btn btn-primary" id="unlockBtn" onclick="unlock()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
    Unlock & Read
  </button>

  <div class="app-brand">
    <div class="logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>
    <span>Wellens</span>
  </div>
</div>

<script>
const shareId = window.wellens.getShareId();

function togglePw() {
  const inp = document.getElementById('passwordInput');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
});

async function unlock() {
  const password = document.getElementById('passwordInput').value;
  if (!password) { showError('Please enter a password.'); return; }

  const btn = document.getElementById('unlockBtn');
  btn.disabled = true;
  btn.textContent = 'Verifying…';

  const res = await window.wellens.unlockShare({ shareId, password });

  if (!res.success) {
    showError(res.error || 'Failed to unlock.');
    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg> Unlock & Read`;
    return;
  }

  btn.textContent = 'Opening…';
  await window.wellens.openReader({ sessionToken: res.sessionToken });
  window.wellens.closeWindow();
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.className = 'error-msg show';
  if (msg.includes('Device limit') || msg.includes('expired on this device')) {
    el.classList.add('device-limit');
  }
  setTimeout(() => el.className = 'error-msg', 6000);
}
</script>
</body>
</html>
